name: AoV Daily Monitor

on:
  schedule:
    # 每天 UTC 00:00 (台北時間 08:00) 執行
    - cron: '0 0 * * *'
  # 允許在 GitHub 網頁上手動點擊執行
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    # 賦予 GitHub Actions 推送 Commit 的權限 (讓 hot-deployer 生效)
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          # 取出完整歷史紀錄以利後續的 Git 操作
          fetch-depth: 0
          
      - name: 🐍 Setup Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8.5'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 若爬蟲需要 playwright 瀏覽器核心，可在此安裝
          playwright install chromium

      - name: 🚀 Execute AoV Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_PAGES_URL: ${{ secrets.PAGES_URL }}
        # 執行主程式的 --run-now 模式，這會觸發：搜集 → 分析 → 報告 → 推播 → 備份 Push
        run: |
          python main.py --run-now

      - name: 🛠️ Git Configuration (Fallback)
        # 如果 python main.py 裡面的 Git push 失敗，我們在這裡上第二道保險
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reports/ || true
          git commit -m "docs: 戰略報告自動同步 (Fallback) $(date +'%Y-%m-%d')" || true
          git push || true
