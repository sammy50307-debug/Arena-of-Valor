<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【旗艦版】萌系戰情室 — 最終視覺校閱</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #fdf2f8 0%, #f5f3ff 50%, #ecfeff 100%);
            --glass-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(255, 255, 255, 0.5);
            --primary-cute: #db2777;
            --secondary-cute: #7c3aed;
            --text-main: #1e293b;
            --card-shadow: 0 12px 40px rgba(219, 39, 119, 0.1);
            --hover-shadow: 0 20px 50px rgba(219, 39, 119, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
        }

        .container { width: 100%; max-width: 1000px; }

        /* ── Header ── */
        .header { text-align: center; margin-bottom: 4rem; }
        .header h1 {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(to right, var(--primary-cute), var(--secondary-cute));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }
        .badge {
            display: inline-block;
            background: white;
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            font-weight: 800;
            color: var(--secondary-cute);
            font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 1rem;
        }

        /* ── Hero Focus Card (Premium) ── */
        .hero-focus-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 3rem;
            border: 3px solid #f9a8d4;
            position: relative;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-bottom: 3rem;
        }

        .hero-focus-card:hover {
            transform: translateY(-10px) scale(1.01);
            box-shadow: var(--hover-shadow);
        }

        /* Decor: Sakura */
        .hero-focus-card::before {
            content: '🌸';
            position: absolute;
            bottom: -25px;
            left: -25px;
            font-size: 9rem;
            opacity: 0.15;
            transform: rotate(-15deg);
            filter: drop-shadow(0 0 20px #f9a8d4);
            z-index: 0;
        }

        /* Decor: Leaf */
        .leaf-decor {
            position: absolute;
            top: 25px;
            left: 60px;
            font-size: 1.5rem;
            opacity: 0.3;
            transform: rotate(15deg);
            z-index: 1;
        }

        /* Ribbon */
        .hero-focus-card::after {
            content: 'HERO FOCUS';
            position: absolute;
            top: 28px;
            right: -45px;
            background: linear-gradient(135deg, #f472b6, #db2777);
            color: white;
            padding: 12px 60px;
            transform: rotate(45deg);
            font-size: 0.85rem;
            font-weight: 900;
            letter-spacing: 3px;
            box-shadow: 0 4px 15px rgba(219, 39, 119, 0.3);
            z-index: 2;
        }

        h2 {
            color: var(--primary-cute);
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            z-index: 1;
        }

        /* Mood Bar */
        .mood-box { margin: 2rem 0; position: relative; z-index: 1; }
        .mood-label { font-size: 0.95rem; font-weight: 800; color: #db2777; margin-bottom: 0.8rem; display: block; opacity: 0.8; }
        
        .mood-container {
            background: rgba(255, 255, 255, 0.5);
            height: 16px;
            border-radius: 99px;
            border: 1px solid rgba(251, 207, 232, 0.8);
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .mood-fill {
            height: 100%;
            width: 82%; 
            background: linear-gradient(to right, #f472b6, #db2777);
            border-radius: 99px;
            box-shadow: 2px 0 12px rgba(219, 39, 119, 0.4);
            animation: slideIn 1.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideIn { from { width: 0; } to { width: 82%; } }

        .content { 
            color: #831843; 
            font-size: 1.15rem;
            line-height: 1.8; 
            position: relative; 
            z-index: 1; 
            font-weight: 500;
            padding-left: 1rem;
            border-left: 4px solid #f9a8d4;
        }

        footer { margin-top: 4rem; text-align: center; color: #94a3b8; font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="badge">PHASE 22: LUSH & LIVELY UI COMPLETE</div>
            <h1>萌系戰情室</h1>
            <p style="color: #64748b; font-size: 1.1rem;">這就是我們慢工出細活雕琢出的最終視覺樣式。</p>
        </header>

        <div class="hero-focus-card">
            <span class="leaf-decor">🍃</span>
            <h2>🌸 芽芽 觀察室</h2>
            <div class="mood-box">
                <span class="mood-label">今日萌力值 (Sentiment Index)</span>
                <div class="mood-container">
                    <div class="mood-fill"></div>
                </div>
            </div>
            <div class="content">
                玩家今日對芽芽的討論集中在「功能型輔助的生存策略」。<br>
                大部分玩家對於芽芽的造型與操作手感給予正面評價，但也提及了在高端局的抗壓需求。<br>
                不管是「發霉芽」還是「小芽卷」，都是大家守護的對象！✨
            </div>
        </div>

        <footer>
            DESIGNED WITH ❤️ BY ANTIGRAVITY | ALWAYS BACKED UP TO GITHUB & OBSIDIAN
        </footer>
    </div>
</body>
</html>
