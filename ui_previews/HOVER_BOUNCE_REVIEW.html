<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【最終篇】萌系戰情室 — 懸停選取跳動感</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #fdf2f8 0%, #f5f3ff 50%, #ecfeff 100%);
            --glass-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(255, 255, 255, 0.5);
            --primary-cute: #db2777;
            --secondary-cute: #7c3aed;
            --text-main: #1e293b;
            --card-shadow: 0 12px 40px rgba(219, 39, 119, 0.1);
            --hover-shadow: 0 30px 70px rgba(219, 39, 119, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 800px; }

        h1 { 
            font-size: 2.5rem; 
            font-weight: 900; 
            text-align: center; 
            margin-bottom: 3rem;
            background: linear-gradient(to right, var(--primary-cute), var(--secondary-cute));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ── Post Card with Selection Bounce ── */
        .post-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 2px solid transparent;
            text-decoration: none;
            color: inherit;
            display: block;
            
            /* Pop-in entry */
            opacity: 0;
            transform: scale(0.8) translateY(30px);
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            
            /* Hover Transition: Extremely Bouncy */
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.5);
            box-shadow: var(--card-shadow);
            cursor: pointer;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(30px); }
            70% { transform: scale(1.05) translateY(-5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 🔴 關鍵修改：懸停選取跳動感 🔴 */
        .post-card:hover {
            transform: translateY(-20px) scale(1.08); /* 大幅跳動與縮放 */
            background: rgba(255, 255, 255, 0.98);
            box-shadow: var(--hover-shadow);
            border: 3px solid #f9a8d4; /* 邊框加強 */
            z-index: 100;
            filter: drop-shadow(0 0 15px rgba(249, 168, 212, 0.6)); /* 外發光確認感 */
        }

        .post-card:active {
            transform: translateY(-10px) scale(0.95); /* 點擊時的物理下壓感 */
            transition: all 0.1s ease;
        }

        .title { font-weight: 900; font-size: 1.4rem; color: #1e293b; margin-bottom: 0.5rem; }
        .tag { background: #fdf2f8; color: #db2777; padding: 4px 12px; border-radius: 8px; font-weight: 800; font-size: 0.8rem; }
        .hint { text-align: center; color: #64748b; font-weight: 600; margin-bottom: 1rem; font-size: 1.1rem; }

    </style>
</head>
<body>
    <div class="container">
        <h1>選取回饋驗證室</h1>
        <p class="hint">🎯 請試著將滑鼠移到下方的資訊條上 🎯</p>
        
        <a href="#" class="post-card" style="animation-delay: 0.1s;">
            <span class="tag">Selection Test 01</span>
            <div class="title" style="margin-top: 0.8rem;">我有強烈的「被選取感」嗎？</div>
            <p style="color: #64748b; line-height: 1.6;">當您滑過來時，我會主動「跳」向您，並帶有粉色發光提示。</p>
        </a>

        <a href="#" class="post-card" style="animation-delay: 0.25s;">
            <span class="tag">Selection Test 02</span>
            <div class="title" style="margin-top: 0.8rem; color: #db2777;">點擊時還有「下壓感」</div>
            <p style="color: #64748b; line-height: 1.6;">試著點擊滑鼠左鍵不放，我會產生物理性的回彈縮放。</p>
        </a>

        <a href="#" class="post-card" style="animation-delay: 0.4s;">
            <span class="tag">Selection Test 03</span>
            <div class="title" style="margin-top: 0.8rem;">慢工出細活的結晶</div>
            <p style="color: #64748b; line-height: 1.6;">這就是 Phase 22 最後一塊拼圖：觸覺般的互動回饋。</p>
        </a>
    </div>
</body>
</html>
