<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【旗艦版】萌系戰情室 — Q彈跳動感展現</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #fdf2f8 0%, #f5f3ff 50%, #ecfeff 100%);
            --glass-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(255, 255, 255, 0.5);
            --primary-cute: #db2777;
            --secondary-cute: #7c3aed;
            --text-main: #1e293b;
            --card-shadow: 0 12px 40px rgba(219, 39, 119, 0.1);
            --hover-shadow: 0 20px 50px rgba(219, 39, 119, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 3rem 2rem;
            overflow-x: hidden;
        }

        .layout-container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2.5rem;
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
        }

        h2 { 
            color: var(--primary-cute); 
            font-size: 1.8rem; 
            font-weight: 900; 
            margin-bottom: 2rem; 
            text-align: center;
            letter-spacing: 1px;
        }

        /* ── Q-Bounce (PopIn) Animation ── */
        .post-card {
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
            text-decoration: none;
            color: inherit;
            display: block;
            
            /* Initial State */
            opacity: 0;
            transform: scale(0.7) translateY(40px);
            
            /* Spring Physics Animation */
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.7) translateY(40px);
            }
            70% {
                transform: scale(1.08) translateY(-10px); /* Overshoot */
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0); /* Settle */
            }
        }

        .post-card:hover {
            transform: translateY(-15px) scale(1.05);
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 25px 50px rgba(219, 39, 119, 0.15);
            z-index: 100;
            border-color: #f9a8d4;
        }

        .post-title { font-weight: 900; font-size: 1.3rem; color: #1e293b; margin-bottom: 0.8rem; }
        .tag { background: #fdf2f8; color: #db2777; padding: 4px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; }
        .desc { margin-top: 1rem; color: #64748b; line-height: 1.6; font-size: 1rem; }

        .refresh-btn {
            display: block;
            margin: 0 auto 2rem;
            padding: 0.8rem 2rem;
            background: var(--primary-cute);
            color: white;
            border: none;
            border-radius: 99px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(219, 39, 119, 0.2);
            transition: transform 0.2s;
        }
        .refresh-btn:hover { transform: scale(1.05); }

    </style>
</head>
<body>
    <div class="layout-container">
        <button class="refresh-btn" onclick="location.reload()">點我重新整理：觀看 Q 彈跳動效果</button>
        
        <div class="card">
            <h2>📰 最終驗證：Q 彈跳動感 (Pop-in Response)</h2>
            
            <a href="#" class="post-card" style="animation-delay: 0.1s;">
                <span class="tag">High Bounce</span>
                <div class="post-title" style="color: #db2777; margin-top: 0.5rem;">第一波：Q 彈進場 (0.1s)</div>
                <p class="desc">我有明顯的「撐開再收回」動作，這就是您要的跳動感！</p>
            </a>

            <a href="#" class="post-card" style="animation-delay: 0.25s;">
                <span class="tag">Spring Physics</span>
                <div class="post-title" style="margin-top: 0.5rem;">第二波：連鎖反應 (0.25s)</div>
                <p class="desc">間隔稍微拉開，讓每一條的「跳動」都能被眼睛捕捉到。</p>
            </a>

            <a href="#" class="post-card" style="animation-delay: 0.4s;">
                <span class="tag">Active Feedback</span>
                <div class="post-title" style="color: #db2777; margin-top: 0.5rem;">第三波：懸停魅力 (0.4s)</div>
                <p class="desc">試著把滑鼠移上來，我的「大幅度跳動」會讓資訊更有生命力。</p>
            </a>

            <a href="#" class="post-card" style="animation-delay: 0.55s;">
                <span class="tag">Final Settle</span>
                <div class="post-title" style="margin-top: 0.5rem;">第四波：完美落地 (0.55s)</div>
                <p class="desc">當所有資訊都坐穩後，整個頁面看起來非常豐富且有動感。</p>
            </a>
        </div>
    </div>
</body>
</html>
