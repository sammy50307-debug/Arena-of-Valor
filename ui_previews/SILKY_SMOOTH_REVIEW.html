<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【究極絲滑版】萌系戰情室 — 互動體驗校閱</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #fdf2f8 0%, #f5f3ff 50%, #ecfeff 100%);
            --glass-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(255, 255, 255, 0.5);
            --primary-cute: #db2777;
            --secondary-cute: #7c3aed;
            --text-main: #1e293b;
            --card-shadow: 0 10px 30px rgba(219, 39, 119, 0.08);
            --hover-shadow: 0 25px 60px rgba(219, 39, 119, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 800px; }

        h1 { 
            font-size: 2.2rem; 
            font-weight: 900; 
            text-align: center; 
            margin-bottom: 2rem;
            color: var(--primary-cute);
        }

        .hint { text-align: center; color: #64748b; margin-bottom: 2rem; font-weight: 600; }

        /* ── Silky Smooth Post Card ── */
        .post-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 1.8rem;
            margin-bottom: 1.8rem;
            border: 1px solid var(--glass-border);
            text-decoration: none;
            color: inherit;
            display: block;
            
            /* Initial State */
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            animation: softPop 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            
            /* 🔴 滑鼠懸停：調整為絲滑 Circ-Out 曲線 🔴 */
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), 
                        background 0.4s ease, 
                        box-shadow 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            
            box-shadow: var(--card-shadow);
            will-change: transform; /* GPU 加速 */
            cursor: pointer;
        }

        @keyframes softPop {
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .post-card:hover {
            /* 調整回饋力道：不再過度抖動，而是吸附般的絲滑跳動 */
            transform: translateY(-12px) scale(1.03); 
            background: rgba(255, 255, 255, 0.98);
            box-shadow: var(--hover-shadow);
            border: 2px solid #f9a8d4;
            filter: drop-shadow(0 0 10px rgba(249, 168, 212, 0.3));
        }

        .post-card:active {
            transform: translateY(-4px) scale(0.98);
            transition: transform 0.15s ease;
        }

        .title { font-weight: 900; font-size: 1.3rem; color: #1e293b; margin-bottom: 0.5rem; }
        .tag { background: #fdf2f8; color: #db2777; padding: 4px 10px; border-radius: 8px; font-weight: 800; font-size: 0.75rem; }

    </style>
</head>
<body>
    <div class="container">
        <h1>最後一哩路：絲滑質感校閱</h1>
        <p class="hint">✨ 請嘗試滑過下方資訊卡片，感受「慢速但精準」的跳動感 ✨</p>
        
        <a href="#" class="post-card" style="animation-delay: 0.1s;">
            <span class="tag">Silky Smooth 01</span>
            <div class="title" style="margin-top: 0.8rem;">我有變得更順暢了嗎？</div>
            <p style="color: #64748b; line-height: 1.6;">我移除了過猛的回彈，改用高級的 Circ-Out 曲線，現在跳動起來應該像奶油一樣順滑。</p>
        </a>

        <a href="#" class="post-card" style="animation-delay: 0.2s;">
            <span class="tag">Silky Smooth 02</span>
            <div class="title" style="margin-top: 0.8rem; color: #db2777;">吸附般的移動感</div>
            <p style="color: #64748b; line-height: 1.6;">當您選取我時，我不再是生硬地彈起，而是優雅地浮現。</p>
        </a>

        <a href="#" class="post-card" style="animation-delay: 0.3s;">
            <span class="tag">Final Polish</span>
            <div class="title" style="margin-top: 0.8rem;">慢工出細活的真諦</div>
            <p style="color: #64748b; line-height: 1.6;">這種「Q 而不僵」的質感，是旗艦級 UI 最難調整的部分。</p>
        </a>
    </div>
</body>
</html>
