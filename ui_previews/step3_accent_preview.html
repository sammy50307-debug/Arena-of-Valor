<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旗艦 UI 大改造：步驟三預覽 (Accents & Mood Bar)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #fdf2f8 0%, #f5f3ff 50%, #ecfeff 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --primary-cute: #db2777;
            --secondary-cute: #7c3aed;
        }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* ── Hero Focus Card ── */
        .hero-focus-card {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            border: 3px solid #f9a8d4;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 45px rgba(219, 39, 119, 0.12);
        }

        /* Cherry Blossom floating element */
        .hero-focus-card::before {
            content: '🌸';
            position: absolute;
            bottom: -20px;
            left: -20px;
            font-size: 8rem;
            opacity: 0.15;
            transform: rotate(-20deg);
            filter: drop-shadow(0 0 15px #f9a8d4);
            z-index: 0;
        }

        /* Hero Focus Ribbon */
        .hero-focus-card::after {
            content: 'HERO FOCUS';
            position: absolute;
            top: 24px;
            right: -42px;
            background: linear-gradient(135deg, #f472b6, #db2777);
            color: white;
            padding: 10px 50px;
            transform: rotate(45deg);
            font-size: 0.8rem;
            font-weight: 900;
            letter-spacing: 2.5px;
            box-shadow: 0 4px 15px rgba(219, 39, 119, 0.3);
            z-index: 2;
        }

        h2 {
            color: var(--primary-cute);
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        /* Mood Bar */
        .mood-box { margin: 2rem 0; position: relative; z-index: 1; }
        .mood-label { font-size: 0.85rem; font-weight: 700; color: #db2777; margin-bottom: 0.6rem; display: block; }
        
        .mood-container {
            background: rgba(255, 255, 255, 0.5);
            height: 14px;
            border-radius: 99px;
            border: 1px solid rgba(251, 207, 232, 0.8);
            overflow: hidden;
        }

        .mood-fill {
            height: 100%;
            width: 75%; /* Mock value */
            background: linear-gradient(to right, #f472b6, #db2777);
            border-radius: 99px;
            box-shadow: 2px 0 10px rgba(219, 39, 119, 0.4);
            animation: slideIn 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideIn { from { width: 0; } to { width: 75%; } }

        .content { color: #831843; line-height: 1.8; position: relative; z-index: 1; font-weight: 500; }
    </style>
</head>
<body>
    <div class="hero-focus-card">
        <h2>🌸 芽芽 觀察室</h2>
        <div class="mood-box">
            <span class="mood-label">今日萌力值 (Sentiment Index)</span>
            <div class="mood-container">
                <div class="mood-fill"></div>
            </div>
        </div>
        <div class="content">
            最近大家都在討論發霉芽到底要怎麼進場... 有人說出裝要改，也有人說關鍵是跟隊友的默契。大家一起守護最好的小芽卷吧！✨
        </div>
    </div>
</body>
</html>
